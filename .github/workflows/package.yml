name: Package & Release Datapack Mod

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Pack
        run: |
          mkdir -p build
          # Zip standard directories and metadata files, excluding git configs and workflows.
          zip -r build/lampas-data-pack.jar data/ pack.mcmeta META-INF/ README.md -x "*.git*"
          cp build/lampas-data-pack.jar build/lampas-data-pack.zip

      - name: Tag and Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch all tags from remote to prevent sync issues
          git fetch --tags

          # Determine next version (v1.0.<run_number>)
          VERSION="v1.0.${{ github.run_number }}"
          echo "Target version: $VERSION"

          # Create and push the new version tag
          git tag $VERSION
          git push origin $VERSION

          # Force update and push the 'latest' tag
          git tag -f latest
          git push -f origin latest

          # Create the GitHub Release and upload build assets
          gh release create $VERSION build/lampas-data-pack.jar build/lampas-data-pack.zip \
            --title "Release $VERSION" \
            --generate-notes
